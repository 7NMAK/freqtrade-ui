##
## Docker Compose — FreqTrade Trading System (Full Stack)
##
## Services:
##   postgres        — Orchestrator metadata DB (NOT trade data)
##   redis           — Pub/sub for heartbeat events + cache
##   orchestrator    — FastAPI app (multi-bot mgmt, kill switch, heartbeat)
##   frontend        — Next.js 14 UI
##   nginx           — Reverse proxy (SSL termination, routing)
##   prometheus      — Metrics collection
##   alertmanager    — Fires Telegram/email alerts from Prometheus rules
##   node-exporter   — Host-level metrics (disk/CPU/RAM)
##   grafana         — Monitoring dashboards
##   pg-backup       — Automated PostgreSQL backups (local + optional off-site)
##
## FreqTrade bot containers are managed DYNAMICALLY by the orchestrator
## via Docker API — they are NOT defined here.
##

# YAML anchor for logging config — prevents any single service from filling
# the host disk. json-file driver rotates automatically. Any service without
# explicit logging config inherits this via the <<: *default-logging pattern.
x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orch_postgres
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
    logging: *default-logging
    networks:
      - ft_network

  # ── Cache / Pub-Sub ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orch_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    networks:
      - ft_network

  # ── Orchestrator (FastAPI) ────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    # Give in-flight requests (forceexit, start, kill) a chance to finish
    # before SIGKILL. Orchestrator signal handler sets a 'draining' flag.
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      ORCH_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-orchestrator}"
      ORCH_REDIS_URL: "redis://redis:6379/0"
      ORCH_SECRET_KEY: "${ORCH_SECRET_KEY:?ORCH_SECRET_KEY must be set in .env}"
      ORCH_ENCRYPTION_KEY: "${ORCH_ENCRYPTION_KEY:-}"
      ORCH_ACCESS_TOKEN_EXPIRE_MINUTES: "${ORCH_ACCESS_TOKEN_EXPIRE_MINUTES:-120}"
      ORCH_REFRESH_TOKEN_EXPIRE_MINUTES: "${ORCH_REFRESH_TOKEN_EXPIRE_MINUTES:-1440}"
      ORCH_HEARTBEAT_INTERVAL_SECONDS: "${ORCH_HEARTBEAT_INTERVAL_SECONDS:-3}"
      ORCH_HEARTBEAT_MAX_FAILURES: "${ORCH_HEARTBEAT_MAX_FAILURES:-3}"
      ORCH_FT_DOCKER_IMAGE: "${ORCH_FT_DOCKER_IMAGE:-freqtradeorg/freqtrade@sha256:e4c7d501d9bb03cb885b4b5ee4b2a15c8e15da0b8c602a7f8c0aded7e1f77fe1}"
      ORCH_FT_BASE_PORT: "${ORCH_FT_BASE_PORT:-8080}"
      ORCH_ADMIN_USERNAME: "${ORCH_ADMIN_USERNAME:-admin}"
      ORCH_ADMIN_PASSWORD: "${ORCH_ADMIN_PASSWORD:?ORCH_ADMIN_PASSWORD must be set in .env}"
      # Off-site backup credentials (pg-backup reads these)
      S3_BACKUP_BUCKET: "${S3_BACKUP_BUCKET:-}"
      S3_BACKUP_ENDPOINT: "${S3_BACKUP_ENDPOINT:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    # group_add gives docker socket access to the non-root user inside container
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/freqtrade/user_data:/opt/freqtrade/user_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
    logging: *default-logging
    networks:
      - ft_network

  # ── Frontend (Next.js) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: frontend
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      orchestrator:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    networks:
      - ft_network

  # ── Nginx (Reverse Proxy + SSL) ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
    logging: *default-logging
    networks:
      - ft_network

  # ── Prometheus (Metrics) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/prometheus/"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/prometheus/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
    logging: *default-logging
    networks:
      - ft_network

  # ── Alertmanager (fires alerts from Prometheus rules) ───
  # Requires ALERT_TELEGRAM_BOT_TOKEN and ALERT_TELEGRAM_CHAT_ID in .env to send alerts.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    expose:
      - "9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      ALERT_TELEGRAM_BOT_TOKEN: "${ALERT_TELEGRAM_BOT_TOKEN:-}"
      ALERT_TELEGRAM_CHAT_ID: "${ALERT_TELEGRAM_CHAT_ID:-}"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=/alertmanager/"
      - "--web.route-prefix=/alertmanager/"
    deploy:
      resources:
        limits:
          memory: 128m
    logging: *default-logging
    networks:
      - ft_network

  # ── Node Exporter (host-level metrics) ────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          memory: 128m
    logging: *default-logging
    networks:
      - ft_network

  # ── Grafana (Dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}"
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL:-http://localhost/grafana/}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    networks:
      - ft_network

  # ── PostgreSQL Backup (cron-based + off-site push) ────────
  pg-backup:
    image: postgres:16-alpine
    container_name: pg_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      # Off-site (optional): set in .env to enable rclone push
      S3_BACKUP_BUCKET: "${S3_BACKUP_BUCKET:-}"
      S3_BACKUP_ENDPOINT: "${S3_BACKUP_ENDPOINT:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - pg_backups:/backups
      # Mount FT user_data so SQLite per-bot DBs can be backed up too
      - /opt/freqtrade/user_data:/freqtrade_user_data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache rclone > /dev/null 2>&1 || true
        cp /scripts/backup.sh /usr/local/bin/backup.sh
        chmod +x /usr/local/bin/backup.sh
        echo "0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        echo "Backup cron installed — daily at 02:00 UTC"
        /usr/local/bin/backup.sh
        crond -f -l 2
    logging: *default-logging
    networks:
      - ft_network

networks:
  ft_network:
    name: ft_network
    external: true

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  pg_backups:
  certbot_webroot:
  certbot_certs:
