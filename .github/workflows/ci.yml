##
## CI Pipeline — Lint, Test, Build
##
## Runs on: push to main, pull requests to main
## Jobs:
##   lint-frontend    — ESLint + TypeScript check
##   lint-backend     — Python syntax check
##   build-frontend   — Next.js production build
##   build-docker     — Docker Compose build (all services)
##

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend Lint & Type Check ─────────────────────────────
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Backend Lint ───────────────────────────────────────────
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (all files)
        run: python -m py_compile src/main.py && find src -name "*.py" -exec python -m py_compile {} +

  # ── Frontend Build ─────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --ignore-scripts

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api

  # ── Docker Build (all services) ────────────────────────────
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Create ft_network
        run: docker network create ft_network

      - name: Build all services
        run: docker compose build

      - name: Verify images created
        run: |
          docker images | grep -E "orchestrator|frontend" || exit 1
          echo "All images built successfully"
