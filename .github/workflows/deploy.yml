##
## Deploy Pipeline — Push to server
##
## Triggered: after CI passes on main, or manually
## Target: 204.168.187.107
##
## Required GitHub Secrets:
##   SERVER_SSH_KEY    — SSH private key for root@204.168.187.107
##   SERVER_HOST       — 204.168.187.107
##   SERVER_USER       — root
##

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/freqtrade-ui

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Create network if needed
            docker network create ft_network 2>/dev/null || true
            docker network connect ft_network freqtrade 2>/dev/null || true

            # Build and restart
            docker compose build --no-cache
            docker compose up -d

            # Wait for health
            sleep 10

            # Verify
            curl -sf http://127.0.0.1:8888/api/health || exit 1
            curl -sf http://127.0.0.1/health || exit 1

            echo "Deploy successful"
