##
## Prometheus — Scrape configuration + alerting
##

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - path_prefix: "/alertmanager"
      static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Orchestrator metrics (auth required) ───────────────
  # Bearer token in /etc/prometheus/orch_token (mount it or set ORCH_METRICS_TOKEN in .env)
  - job_name: "orchestrator"
    metrics_path: "/api/metrics"
    authorization:
      type: Bearer
      credentials_file: "/etc/prometheus/orch_token"
    static_configs:
      - targets: ["orchestrator:8888"]
        labels:
          service: "orchestrator"

  # ── Prometheus self-monitoring ─────────────────────────
  - job_name: "prometheus"
    metrics_path: "/prometheus/metrics"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ── Node exporter (host metrics) ───────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"
