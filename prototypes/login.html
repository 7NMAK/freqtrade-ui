<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreqTrade Platform — Login</title>
<style>
  :root {
    --bg-0: #06060b;
    --bg-1: #0c0c14;
    --bg-2: #12121c;
    --bg-3: #1a1a28;
    --border: #1e1e30;
    --border-hover: #2e2e48;
    --text-0: #f0f0f5;
    --text-1: #c0c0d0;
    --text-2: #808098;
    --text-3: #55556a;
    --accent: #6366f1;
    --accent-dim: #4f46e5;
    --accent-glow: rgba(99,102,241,.12);
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--text-0);
    background: var(--bg-0);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139,92,246,.04) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px 32px;
    margin: 20px;
  }

  /* Logo */
  .logo-section {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(99,102,241,.25);
  }

  .logo-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-0);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .logo-subtitle {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 400;
  }

  /* Form */
  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-1);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 12px;
    color: var(--text-3);
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  .input-icon svg {
    width: 16px;
    height: 16px;
  }

  .form-input {
    width: 100%;
    height: 42px;
    padding: 0 12px 0 38px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-0);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .form-input::placeholder {
    color: var(--text-3);
  }

  .form-input:hover {
    border-color: var(--border-hover);
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .password-toggle {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    border-radius: 4px;
    transition: color 0.15s ease;
  }

  .password-toggle:hover {
    color: var(--text-1);
  }

  .password-toggle svg {
    width: 16px;
    height: 16px;
  }

  /* Remember me */
  .remember-row {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    margin-top: 4px;
  }

  .checkbox-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .checkbox-wrapper input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .checkmark {
    width: 16px;
    height: 16px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .checkmark svg {
    width: 10px;
    height: 10px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .checkbox-wrapper input:checked + .checkmark {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox-wrapper input:checked + .checkmark svg {
    opacity: 1;
  }

  .checkbox-wrapper input:focus-visible + .checkmark {
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .checkbox-label {
    font-size: 12px;
    color: var(--text-2);
    margin-left: 8px;
    cursor: pointer;
  }

  /* Submit button */
  .btn-signin {
    width: 100%;
    height: 42px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.1px;
    transition: opacity 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
  }

  .btn-signin:hover {
    opacity: 0.92;
    box-shadow: 0 4px 20px rgba(99,102,241,.3);
  }

  .btn-signin:active {
    transform: scale(0.985);
  }

  .btn-signin:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 20px rgba(99,102,241,.3);
  }

  /* Error message */
  .error-message {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: 8px;
    color: var(--red);
    font-size: 12px;
    line-height: 1.4;
  }

  .error-message.visible {
    display: flex;
  }

  .error-message svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* Footer */
  .card-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .card-footer-version {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 2px;
  }

  .card-footer-powered {
    font-size: 11px;
    color: var(--text-3);
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="login-card">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-icon">FT</div>
      <div class="logo-title">FreqTrade Platform</div>
      <div class="logo-subtitle">Multi-Strategy Trading System</div>
    </div>

    <!-- Error message -->
    <div class="error-message" id="errorMessage">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="6.25"/>
        <line x1="8" y1="5.5" x2="8" y2="8.5"/>
        <circle cx="8" cy="10.75" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      <span id="errorText">Invalid username or password.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="5" r="3.25"/>
              <path d="M2.5 14.5c0-2.5 2.5-4 5.5-4s5.5 1.5 5.5 4"/>
            </svg>
          </span>
          <input class="form-input" type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="7" width="10" height="7" rx="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/>
              <circle cx="8" cy="10.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required style="padding-right:38px">
          <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility" id="toggleBtn">
            <svg id="eyeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8s-2.5 4.5-6.5 4.5S1.5 8 1.5 8z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
            <svg id="eyeOffIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M2 2l12 12"/>
              <path d="M6.5 6.5a2 2 0 0 0 2.83 2.83"/>
              <path d="M4.2 4.2C2.7 5.4 1.5 8 1.5 8s2.5 4.5 6.5 4.5c1.3 0 2.4-.4 3.3-1"/>
              <path d="M11.8 11.8c1.5-1.2 2.7-3.8 2.7-3.8s-2.5-4.5-6.5-4.5c-.5 0-1 .06-1.5.17"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="remember" name="remember">
          <span class="checkmark">
            <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,5.5 4.2,7.5 8,2.5"/>
            </svg>
          </span>
          <span class="checkbox-label">Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      <div class="card-footer-version">FreqTrade v2026.2</div>
      <div class="card-footer-powered">Powered by FreqTrade</div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');
      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = 'block';
      } else {
        input.type = 'password';
        eyeIcon.style.display = 'block';
        eyeOffIcon.style.display = 'none';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      errorEl.classList.remove('visible');

      if (!username || !password) {
        errorText.textContent = 'Please enter both username and password.';
        errorEl.classList.add('visible');
        return false;
      }

      // Prototype: simulate authentication
      // In production this would POST to the orchestrator /api/auth/login
      window.location.href = 'dashboard.html';
      return false;
    }
  </script>
</body>
</html>
