<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreqTrade | LINEAR EDGE (Scaled to 30 Bots)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
        colors: {
            background: "#000000",
            surface: "#0A0A0A",
            border: "rgba(255,255,255,0.08)",
            borderHover: "rgba(255,255,255,0.15)",
            muted: "#A1A1AA",
            foreground: "#FAFAFA",
            accent: "#FFFFFF",
            up: "#10b981",
            down: "#f43f5e"
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; background: #000; color: #FAFAFA; overflow: hidden; font-size: 13px; }
  .linear-border { border: 1px solid rgba(255,255,255,0.08); }
  .linear-border-b { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .linear-border-r { border-right: 1px solid rgba(255,255,255,0.08); }
  .linear-grid { background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 20px 20px; }
  
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* Compact Mode Toggles */
  .bot-card.compact { padding: 4px 12px; display: flex; align-items: center; justify-content: space-between; height: 32px; }
  .bot-card.compact .detailed-stats { display: none; }
  .bot-card.compact .mini-bars { display: none; }
  .bot-card.compact .bot-title { font-size: 11px; margin-bottom: 0 !important; }
</style>
</head>
<body class="w-screen h-screen flex relative">

  <aside class="w-[60px] linear-border-r bg-surface flex flex-col items-center py-4 shrink-0 z-20">
      <div class="w-8 h-8 rounded-lg bg-accent text-black flex items-center justify-center font-bold mb-8 shadow-[0_0_15px_rgba(255,255,255,0.5)]">
          <i data-lucide="zap" class="w-4 h-4 fill-black"></i>
      </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-background relative">
      <header class="h-14 flex items-center px-6 shrink-0 bg-surface/50 border-b border-white/10">
          <span class="text-accent font-semibold tracking-wide font-mono text-xs">FREQTRADE ORCHESTRATOR / 30 BOTS STRESS TEST</span>
      </header>

      <div class="flex-1 overflow-y-auto p-4 flex gap-4 linear-grid">
          
          <!-- FULL HEIGHT BOTS PANEL -->
          <div class="w-[480px] linear-border rounded-lg bg-surface flex flex-col shadow-2xl h-full shrink-0">
              
              <div class="h-10 border-b border-white/10 flex items-center px-4 justify-between shrink-0 bg-black/20">
                  <span class="font-bold text-[11px] uppercase tracking-wide flex items-center gap-2">
                      <div class="w-2 h-2 rounded-full bg-up shadow-[0_0_8px_#10b981]"></div> Active Fleet (30)
                  </span>
                  
                  <!-- COMPACT TOGGLE -->
                  <div class="flex items-center gap-2">
                       <input type="text" placeholder="Filter..." class="h-6 w-24 bg-black border border-white/10 px-2 text-[10px] font-mono rounded text-white focus:outline-none">
                       <button onclick="toggleCompact()" id="compactBtn" class="text-[10px] border border-white/10 px-2 py-0.5 rounded hover:bg-white/10 text-muted transition-colors flex items-center gap-1">
                          <i data-lucide="list" class="w-3 h-3"></i> Compact
                       </button>
                  </div>
              </div>
              
              <!-- JS Injected 30 Bots container -->
              <div id="botList" class="flex-1 overflow-y-auto w-full pb-4"></div>
          </div>

          <!-- RIGHT COL (Charts & Trades combined for stress test simulation) -->
          <div class="flex-1 flex flex-col gap-4 min-w-0">
              <div class="h-[200px] linear-border rounded-lg bg-surface flex flex-col shadow-xl shrink-0">
                  <div class="h-8 border-b border-white/10 flex items-center px-4 shrink-0"><span class="font-bold text-[10px] uppercase text-muted">Aggregate Fleet P&L (30 Bots)</span></div>
                  <div class="flex-1 flex items-center justify-center text-muted font-mono bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGwyMCAwaDB2MjBIMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsIDI1NSwgMjU1LCAwLjAzKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+')]">
                      [ Massive Area Chart Here ]
                  </div>
              </div>

              <!-- Datatable takes remaining space -->
              <div class="flex-1 linear-border rounded-lg bg-surface flex flex-col shadow-xl overflow-hidden">
                  <div class="h-8 border-b border-white/10 flex items-center px-4 bg-black/20">
                      <span class="font-bold text-[10px] uppercase text-accent">Open Trades Container</span>
                  </div>
                  <div class="flex-1 bg-black flex items-center justify-center text-muted text-xs font-mono">
                      [ Active Open Trades from all 30 bots scroll independently here ]
                  </div>
              </div>
          </div>
      </div>
  </main>

  <script>
      // Script to render 30 bots instantly to show performance/layout
      const botList = document.getElementById('botList');
      const pairs = ['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'AVAX'];
      const strategies = ['TrendFollower', 'MeanRev', 'GridPro', 'ApolloBreak', 'RSI-Scalp'];
      
      let html = '';
      for(let i=1; i<=30; i++) {
          let isUp = Math.random() > 0.4;
          let color = isUp ? 'text-up' : 'text-down';
          let sign = isUp ? '+' : '-';
          let val = (Math.random() * 50).toFixed(2);
          let strat = strategies[Math.floor(Math.random()*strategies.length)];
          let pair = pairs[Math.floor(Math.random()*pairs.length)];
          
          html += `
            <div class="bot-card p-3 linear-border-b hover:bg-white/[0.04] transition-all group relative cursor-pointer overflow-hidden">
                <div class="flex justify-between items-start mb-2 bot-title">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full ${isUp ? 'bg-up' : 'bg-down'}"></div>
                        <span class="font-bold text-accent text-sm tracking-tight">${strat}-${pair}-v${i}</span>
                    </div>
                    <div class="font-mono text-xs ${color} font-bold">${sign}$${val}</div>
                </div>
                
                <div class="detailed-stats flex gap-4 text-xs font-mono text-muted mb-3">
                    <div class="flex items-center gap-1"><span class="text-[10px] uppercase font-sans">Trades</span> ${Math.floor(Math.random()*200)}</div>
                    <div class="flex items-center gap-1"><span class="text-[10px] uppercase font-sans">Win</span> ${Math.floor(40 + Math.random()*40)}%</div>
                </div>

                <div class="mini-bars h-5 flex items-end gap-[1px] opacity-30 group-hover:opacity-100 transition-opacity">
                    ${[1,2,3,4,5,6,7].map(() => `<div class="${Math.random()>0.5?'bg-up':'bg-down'} w-1.5 rounded-t-sm" style="height: ${Math.random()*100}%"></div>`).join('')}
                </div>

                <!-- Hover Actions -->
                <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-black p-1 rounded border border-white/20 shadow-xl">
                    <button class="h-6 w-6 rounded bg-surface hover:bg-white/10 flex items-center justify-center text-muted hover:text-white" title="Logs"><i data-lucide="file-text" class="w-3.5 h-3.5"></i></button>
                    ${isUp ? 
                     `<button class="h-6 w-6 rounded bg-surface hover:bg-down hover:text-white flex items-center justify-center text-muted font-bold text-[10px]" title="Stop">🛑</button>` : 
                     `<button class="h-6 w-6 rounded bg-surface hover:bg-up hover:text-white flex items-center justify-center text-muted font-bold text-[10px]" title="Start">▶</button>`}
                </div>
            </div>`;
      }
      botList.innerHTML = html;
      lucide.createIcons();

      // Compact Toggle Logic
      let isCompact = false;
      function toggleCompact() {
          isCompact = !isCompact;
          const cards = document.querySelectorAll('.bot-card');
          const btn = document.getElementById('compactBtn');
          
          if(isCompact) {
              cards.forEach(c => c.classList.add('compact'));
              btn.classList.add('bg-white/10', 'text-white');
              btn.innerHTML = `<i data-lucide="align-justify" class="w-3 h-3 inline mr-1"></i> Expanded`;
          } else {
              cards.forEach(c => c.classList.remove('compact'));
              btn.classList.remove('bg-white/10', 'text-white');
              btn.innerHTML = `<i data-lucide="list" class="w-3 h-3 inline mr-1"></i> Compact`;
          }
          lucide.createIcons();
      }
  </script>
</body>
</html>
