##
## Site config — FreqTrade UI
##
## Routing:
##   /           → frontend (Next.js)
##   /api/       → orchestrator (FastAPI)
##   /grafana/   → Grafana
##   /prometheus/ → Prometheus
##   /health     → Nginx self-check
##   /.well-known/acme-challenge/ → Let's Encrypt
##

# ── HTTP (port 80) ─────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge (always available on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx health check (used by Docker healthcheck)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect to HTTPS if SSL cert exists, otherwise serve directly
    # To enable HTTPS redirect, uncomment the return 301 and comment out the includes
    # return 301 https://$host$request_uri;

    # ── API (Orchestrator) ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://orchestrator/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts (120s for long-running operations like backtest polling)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Login rate limiting (stricter)
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://orchestrator/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Grafana ────────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Grafana live)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Prometheus ─────────────────────────────────────────
    location /prometheus/ {
        proxy_pass http://prometheus/prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (catch-all — must be LAST) ────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR / WebSocket (dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

